<div class="my-reviews-container">
  <h2>My Reviews</h2>
  
  <div class="loading" *ngIf="loading">Loading your reviews...</div>
  
  <div class="reviews-list" *ngIf="!loading">
    <div class="review-card" *ngFor="let review of reviews">
      <div class="review-header">
        <div class="product-info">
          <h3>{{ review.product.productName }}</h3>
          <p class="review-date">Reviewed on {{ review.date | date:'mediumDate' }}</p>
        </div>
        <div class="rating">
          <span class="star" 
                *ngFor="let star of getStarArray(review.rating)"
                [class.filled]="star">★</span>
          <span class="rating-text">({{ review.rating }}/5)</span>
        </div>
      </div>
      
      <div class="review-content">
        <p>{{ review.reviewText }}</p>
      </div>
      
      <div class="review-actions">
        <button class="delete-btn" (click)="deleteReview(review.reviewId!)">
          Delete Review
        </button>
      </div>
    </div>
  </div>
  
  <div class="no-reviews" *ngIf="!loading && reviews.length === 0">
    <p>You haven't written any reviews yet.</p>
    <button routerLink="/userviewproduct" class="shop-btn">Start Shopping</button>
  </div>
</div>

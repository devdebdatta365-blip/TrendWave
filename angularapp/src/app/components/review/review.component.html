<app-usernav></app-usernav>
<div class="review-container">
  <h2>Submit Your Review for {{productName}}</h2>
  <form [formGroup]="reviewForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="reviewText">Write your review here...</label>
      <textarea id="reviewText" formControlName="reviewText"></textarea>
      <div class="error" *ngIf="reviewForm.get('reviewText').invalid && (reviewForm.get('reviewText').dirty || reviewForm.get('reviewText').touched)">
        Review is required
      </div>
    </div>
    <div class="form-group">
      <label for="rating">Rating</label>
      <select id="rating" formControlName="rating">
        <option *ngFor="let r of [1,2,3,4,5]" [value]="r">{{r}}</option>
      </select>
    </div>
    <button type="submit" [disabled]="reviewForm.invalid">Submit Review</button>
    <div class="modal" *ngIf="showSuccess">
      <div class="modal-content">
        <p>Review added successfully!</p>
        <button (click)="showSuccess = false">Close</button>
      </div>
    </div>
  </form>
</div>

<div class="checkout-container">
    <h2>Order Confirmation</h2>
    <div class="invoice">
      <div *ngFor="let item of cartItems">
        {{item.product.productName}} - Quantity: {{item.quantity}} - Price: ₹{{item.price}}
      </div>
      <div><strong>Total Amount: ₹{{totalAmount}}</strong></div>
    </div>
    <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="shippingAddress">Shipping Address</label>
        <input id="shippingAddress" formControlName="shippingAddress" type="text" />
        <div class="error" *ngIf="checkoutForm.get('shippingAddress').invalid && (checkoutForm.get('shippingAddress').dirty || checkoutForm.get('shippingAddress').touched)">
          Shipping address is required
        </div>
      </div>
      <div class="form-group">
        <label for="billingAddress">Billing Address</label>
        <input id="billingAddress" formControlName="billingAddress" type="text" />
        <div class="error" *ngIf="checkoutForm.get('billingAddress').invalid && (checkoutForm.get('billingAddress').dirty || checkoutForm.get('billingAddress').touched)">
          Billing address is required
        </div>
      </div>
      <button type="submit" [disabled]="checkoutForm.invalid">Place Order</button>
      <div class="modal" *ngIf="showSuccess">
        <div class="modal-content">
          <p>Order placed successfully!</p>
          <button (click)="showSuccess = false">Continue Shopping</button>
        </div>
      </div>
    </form>
  </div>

<app-admin-nav></app-admin-nav>
<div class="admin-product-container">
  <div class="header">
    <h2>Product Management</h2>
    <button class="add-btn" (click)="openAddForm()">Add New Product</button>
  </div>

  <div class="products-grid">
    <div class="product-card" *ngFor="let product of products">
      <div class="product-image">
        <img [src]="product.coverImage" [alt]="product.productName" />
      </div>
      <div class="product-info">
        <h3>{{ product.productName }}</h3>
        <p class="description">{{ product.descripion }}</p>
        <p class="price">${{ product.price }}</p>
        <p class="stock">Stock: {{ product.stockInteger }}</p>
        <p class="category">{{ product.category }} - {{ product.brand }}</p>
        <div class="actions">
          <button class="edit-btn" (click)="openEditForm(product)">Edit</button>
          <button class="delete-btn" (click)="deleteProduct(product.productId!)">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Product Form Modal -->
  <div class="modal" *ngIf="showForm">
    <div class="modal-content">
      <div class="modal-header">
        <h3>{{ editingProduct ? 'Edit Product' : 'Add New Product' }}</h3>
        <button class="close-btn" (click)="closeForm()">&times;</button>
      </div>
      
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Product Name:</label>
          <input type="text" [(ngModel)]="newProduct.productName" name="productName" required />
        </div>
        
        <div class="form-group">
          <label>Description:</label>
          <textarea [(ngModel)]="newProduct.descripion" name="descripion" required></textarea>
        </div>
        
        <div class="form-group">
          <label>Price:</label>
          <input type="number" [(ngModel)]="newProduct.price" name="price" required />
        </div>
        
        <div class="form-group">
          <label>Stock Quantity:</label>
          <input type="number" [(ngModel)]="newProduct.stockInteger" name="stockQuantity" required />
        </div>
        
        <div class="form-group">
          <label>Category:</label>
          <input type="text" [(ngModel)]="newProduct.category" name="category" required />
        </div>
        
        <div class="form-group">
          <label>Brand:</label>
          <input type="text" [(ngModel)]="newProduct.brand" name="brand" required />
        </div>
        
        <div class="form-group">
          <label>Cover Image URL:</label>
          <input type="url" [(ngModel)]="newProduct.coverImage" name="coverImage" required />
        </div>
        
        <div class="form-actions">
          <button type="submit" class="save-btn">
            {{ editingProduct ? 'Update' : 'Add' }} Product
          </button>
          <button type="button" class="cancel-btn" (click)="closeForm()">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
